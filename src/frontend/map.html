<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ - SmartTravel</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/map.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body style="overflow: hidden;">
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class='bx bx-paper-plane'></i> SmartTravel
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Trang chủ</a>
                <a href="tours.html" class="nav-link">Tour du lịch</a>
                <a href="map.html" class="nav-link active">Bản đồ</a>
                <a href="checkout.html" class="nav-link">Khuyến mãi</a>
            </nav>
            <div class="nav-actions">
                <button class="btn btn-icon"><i class='bx bx-search'></i></button>
                <div class="user-avatar" style="width: 40px; height: 40px; background-color: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); font-weight: bold; cursor: pointer;">ST</div>
            </div>
        </div>
    </header>

    <div class="map-container">
        <div class="map-sidebar glass-panel" style="z-index: 1000;">
            <h2 class="font-bold mb-4">Tìm điểm đến quanh đây</h2>
            <div class="form-group">
                <div style="position: relative;">
                    <i class='bx bx-search' style="position: absolute; left: 12px; top: 12px; color: var(--text-muted); font-size: 1.2rem;"></i>
                    <input type="text" class="form-control" placeholder="Nhập địa điểm, nhà hàng..." style="padding-left: 40px;">
                </div>
            </div>
            
            <div class="category-tabs flex gap-4 mb-4" style="overflow-x: auto; padding-bottom: 8px;">
                <span class="badge badge-primary" style="padding: 8px 16px; cursor: pointer;">Tất cả</span>
                <span class="badge" style="background: var(--bg-color); color: var(--text-muted); padding: 8px 16px; cursor: pointer;"><i class='bx bx-hotel'></i> Khách sạn</span>
                <span class="badge" style="background: var(--bg-color); color: var(--text-muted); padding: 8px 16px; cursor: pointer;"><i class='bx bx-restaurant'></i> Ăn uống</span>
            </div>

            <div class="places-list">
                <div class="place-item flex gap-4 items-center" data-lat="10.7766" data-lng="106.6984" style="cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.3s;">
                    <img src="https://images.unsplash.com/photo-1555562479-fd33de7dd59e?auto=format&fit=crop&q=80&w=200" alt="place" style="width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover;">
                    <div>
                        <h4 class="font-bold">Nhà hàng Phố Xưa</h4>
                        <p class="text-warning text-sm mb-4"><i class='bx bxs-star'></i> 4.5 (234 đánh giá)</p>
                        <p class="text-muted text-sm"><i class='bx bx-map'></i> Dinh Độc Lập</p>
                    </div>
                </div>
                
                <hr style="border: none; border-top: 1px solid var(--border-color); margin: 16px 0;">

                <div class="place-item flex gap-4 items-center" data-lat="10.7735" data-lng="106.7011" style="cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.3s;">
                    <img src="https://images.unsplash.com/photo-1583344654921-1402d33458e0?auto=format&fit=crop&q=80&w=200" alt="place" style="width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover;">
                    <div>
                        <h4 class="font-bold">Khách sạn Biển Đảo</h4>
                        <p class="text-warning text-sm mb-4"><i class='bx bxs-star'></i> 4.8 (1.2k đánh giá)</p>
                        <p class="text-muted text-sm"><i class='bx bx-map'></i> Chợ Bến Thành</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="map-view">
            <div id="map" style="width: 100%; height: 100%; z-index: 1;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/main.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
